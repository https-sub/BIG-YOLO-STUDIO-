<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIG YOLO | Industrial Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #050505; color: #fff; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #viewport { width: 100vw; height: 60vh; }
        .ui-panel { height: 40vh; background: #0c0c0c; border-top: 2px solid #222; padding: 20px; }
        .stitch-active { color: #fbbf24; text-shadow: 0 0 10px #fbbf24; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 5px; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="viewport"></div>

    <div class="ui-panel flex flex-col gap-4">
        <div class="flex justify-between items-end border-b border-white/5 pb-2">
            <div>
                <h1 class="text-amber-500 font-black italic text-lg leading-none">BIG YOLO</h1>
                <p class="text-[8px] text-zinc-500 tracking-[0.3em] font-bold">INDUSTRIAL SEWING ENGINE</p>
            </div>
            <div class="flex gap-4">
                <div class="flex flex-col items-center">
                    <span class="text-[8px] mb-1">THREAD</span>
                    <input type="color" id="threadColor" value="#fbbf24" class="w-10 h-6 bg-transparent">
                </div>
                <button onclick="location.reload()" class="bg-zinc-900 border border-white/10 px-4 py-2 rounded text-[10px] uppercase font-bold">Flush Memory</button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 flex-1 overflow-hidden">
            <div class="space-y-3">
                <p class="text-[9px] text-zinc-500 font-black">STITCH TYPE</p>
                <div class="flex flex-col gap-2">
                    <button onclick="setStitchType('solid')" class="text-left text-[10px] p-2 bg-zinc-900 rounded border border-white/5 hover:border-amber-500 transition">SOLID (Top Stitch)</button>
                    <button onclick="setStitchType('dashed')" class="text-left text-[10px] p-2 bg-zinc-900 rounded border border-white/5 hover:border-amber-500 transition">DASHED (Overlock)</button>
                </div>
            </div>

            <div class="bg-black/80 rounded-xl p-3 overflow-y-auto border border-white/5">
                <p class="text-[9px] text-zinc-600 mb-2">COORD_MAPPING_SYSTEM</p>
                <div id="nodeList" class="space-y-1 text-[8px] font-mono text-zinc-400">
                    Waiting for input...
                </div>
            </div>
        </div>

        <button onclick="alert('Exporting Tech Pack...')" class="w-full bg-amber-500 text-black py-3 rounded-lg font-black text-xs tracking-widest uppercase mt-2">
            Generate Production File
        </button>
    </div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / (window.innerHeight * 0.6), 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight * 0.6);
        document.getElementById('viewport').appendChild(renderer.domElement);

        // STYLIZED VIEWPORT SETUP
        scene.add(new THREE.AmbientLight(0xffffff, 0.3));
        const pLight = new THREE.PointLight(0xffffff, 1.2);
        pLight.position.set(5, 5, 5);
        scene.add(pLight);

        // THE GARMENT BASE (3D Tech-Form)
        const geometry = new THREE.CapsuleGeometry(1, 2, 4, 32);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x0a0a0a, 
            wireframe: true, 
            transparent: true, 
            opacity: 0.2 
        });
        const garment = new THREE.Mesh(geometry, material);
        scene.add(garment);
        camera.position.z = 4.5;

        let stitchPoints = [];
        let lineSegments = [];
        let stitchMode = 'dashed'; 
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function setStitchType(type) { stitchMode = type; }

        window.addEventListener('click', (e) => {
            if (e.clientY > window.innerHeight * 0.6) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / (window.innerHeight * 0.6)) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(garment);

            if (intersects.length > 0) {
                const point = intersects[0].point;
                addStitch(point);
            }
        });

        function addStitch(pos) {
            // Add Node Visual
            const dot = new THREE.Mesh(
                new THREE.SphereGeometry(0.03, 8, 8),
                new THREE.MeshBasicMaterial({ color: document.getElementById('threadColor').value })
            );
            dot.position.copy(pos);
            scene.add(dot);

            stitchPoints.push(pos);
            
            if (stitchPoints.length > 1) {
                const prev = stitchPoints[stitchPoints.length - 2];
                const curr = stitchPoints[stitchPoints.length - 1];
                
                const lineGeo = new THREE.BufferGeometry().setFromPoints([prev, curr]);
                const lineMat = new THREE.LineDashedMaterial({
                    color: document.getElementById('threadColor').value,
                    dashSize: stitchMode === 'dashed' ? 0.1 : 100,
                    gapSize: stitchMode === 'dashed' ? 0.05 : 0,
                    scale: 1
                });
                
                const line = new THREE.Line(lineGeo, lineMat);
                line.computeLineDistances(); // Required for dashed effect
                scene.add(line);
                lineSegments.push(line);
            }
            updateLog();
        }

        function updateLog() {
            const list = document.getElementById('nodeList');
            list.innerHTML = stitchPoints.map((p, i) => `
                <div class="flex justify-between border-b border-white/5 py-1">
                    <span class="stitch-active">S_${i+1}</span>
                    <span>X:${p.x.toFixed(2)} Y:${p.y.toFixed(2)} Z:${p.z.toFixed(2)}</span>
                </div>
            `).join('');
            list.scrollTop = list.scrollHeight;
        }

        function animate() {
            requestAnimationFrame(animate);
            garment.rotation.y += 0.003;
            lineSegments.forEach(l => l.rotation.y += 0.003);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
